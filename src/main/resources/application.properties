spring.application.name=booking

# ===== SQLite =====
spring.datasource.url=jdbc:sqlite:./booking.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# ===== Khoi tao schema & du lieu mau =====
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.continue-on-error=true

# ===== Server =====
server.port=8080
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB
server.servlet.session.timeout=30m

# ===== Thymeleaf =====
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ===== Logging =====
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG
logging.level.com.luxehaven.booking=DEBUG

# ===== Bank transfer / QR settings =====
# Ban co the dung anh trong /static/images hoac duong dan /uploads/...
payment.bank.name=Vietcombank
payment.bank.account-number=0123456789
payment.bank.account-name=CONG TY LUXEHAVEN
payment.bank.transfer-prefix=BOOKING

# QR ban vua them
payment.bank.qr-image-url=/images/qrvcb.png
payment.momo.qr-image-url=/images/qrmomo.png
payment.momo.account-name=MoMo LuxeHaven
