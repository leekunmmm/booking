<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Bước 3 - Thanh toán')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="page-header" style="padding:3.5rem 0 3rem;">
    <div class="container text-center">
        <span class="breadcrumb-text">Đặt phòng</span>
        <h1 style="font-size:2.4rem;">Bước 3: Quét mã thanh toán</h1>
    </div>
</div>

<div class="container py-5">
    <div class="row g-4 justify-content-center">
        <div class="col-lg-8">
            <div class="auth-card">
                <div class="card-body p-4">
                    <div class="mb-3">
                        <span class="badge bg-secondary">Booking #<span th:text="${booking.id}"></span></span>
                        <span class="badge bg-warning text-dark ms-1" th:text="${booking.paymentMethod.displayName}"></span>
                    </div>

                    <!-- Tóm tắt chi phí -->
                    <div class="border rounded-3 p-3 mb-4" style="background:#faf8f4">
                        <div class="fw-600 mb-2" style="color:var(--navy)">
                            <i class="bi bi-receipt me-1" style="color:var(--gold)"></i>Chi tiết thanh toán
                        </div>
                        <div class="d-flex justify-content-between small mb-1">
                            <span>Phòng <span th:text="${booking.room?.roomNumber}"></span></span>
                            <span th:text="${#temporals.format(booking.checkIn,'dd/MM/yyyy')} + ' → ' + ${#temporals.format(booking.checkOut,'dd/MM/yyyy')}"></span>
                        </div>
                        <div class="d-flex justify-content-between small mb-1">
                            <span><span th:text="${booking.numberOfNights}"></span> đêm × <span th:text="${#numbers.formatInteger(booking.room?.pricePerNight?:0, 0, 'POINT')}"></span> VND</span>
                            <span th:text="${#numbers.formatInteger(booking.numberOfNights * (booking.room?.pricePerNight?:0), 0, 'POINT')} + ' VND'"></span>
                        </div>
                        <div class="d-flex justify-content-between small text-success mb-1"
                             th:if="${booking.voucherCode != null and !#strings.isEmpty(booking.voucherCode)}">
                            <span><i class="bi bi-ticket-perforated me-1"></i>Voucher <strong th:text="${booking.voucherCode}"></strong>
                                <span th:if="${voucherDiscountPercent != null}" class="badge ms-1"
                                      style="background:var(--gold);color:var(--navy);font-size:0.7rem"
                                      th:text="'-' + ${voucherDiscountPercent} + '%'"></span>
                            </span>
                            <span>- <span th:text="${#numbers.formatInteger(booking.numberOfNights * (booking.room?.pricePerNight?:0) - booking.totalPrice, 0, 'POINT')}"></span> VND</span>
                        </div>
                        <hr class="my-2">
                        <div class="d-flex justify-content-between fw-bold">
                            <span>Tổng cần thanh toán</span>
                            <span style="color:var(--gold-deep);font-size:1.1rem"
                                  th:text="${#numbers.formatInteger(booking.totalPrice, 0, 'POINT')} + ' VND'"></span>
                        </div>
                    </div>

                    <div class="alert alert-info mb-4">
                        <strong>Nội dung chuyển khoản:</strong>
                        <span th:text="${(customerPhone != null and !#strings.isEmpty(customerPhone) ? customerPhone : bankTransferPrefix) + '-' + booking.id}"></span>
                    </div>

                    <div class="text-center" th:if="${booking.paymentMethod.name() == 'BANK_TRANSFER'}">
                        <img th:src="${bankQrImageUrl}" alt="QR Bank" style="max-width:260px;width:100%;border:1px solid #eee;border-radius:8px;">
                        <div class="mt-3 small">
                            <div><strong th:text="${bankName}"></strong></div>
                            <div>STK: <strong th:text="${bankAccountNumber}"></strong></div>
                            <div>Chủ TK: <strong th:text="${bankAccountName}"></strong></div>
                        </div>
                    </div>

                    <div class="text-center" th:if="${booking.paymentMethod.name() == 'MOMO'}">
                        <img th:src="${momoQrImageUrl}" alt="QR MoMo" style="max-width:260px;width:100%;border:1px solid #eee;border-radius:8px;">
                        <div class="mt-3 small">
                            <div>Ví nhận: <strong th:text="${momoAccountName}"></strong></div>
                        </div>
                    </div>

                    <form th:action="@{/bookings/{id}/pay(id=${booking.id})}" method="post" class="mt-4 d-flex gap-2">
                        <a th:href="@{/my-bookings}" class="btn btn-outline-secondary">Để sau</a>
                        <button class="btn btn-gold flex-grow-1">
                            Tôi đã thanh toán, gửi admin xác nhận
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
