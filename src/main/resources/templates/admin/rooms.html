<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Quản lý phòng')}"></head>
<body>
<div th:replace="~{fragments/layout :: admin-navbar}"></div>

<div class="admin-layout">
    <div th:replace="~{fragments/layout :: admin-sidebar}"></div>

    <div class="admin-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <span class="section-tag">Admin</span>
                <h2 class="mb-0">Quản lý phòng</h2>
            </div>
            <a th:href="@{/admin/rooms/new}" class="btn btn-gold">
                <i class="bi bi-plus-circle me-2"></i>Thêm phòng
            </a>
        </div>

        <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
        <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

        <!-- Filter -->
        <div class="bg-white p-3 rounded mb-4" style="box-shadow:var(--shadow-sm)">
            <form th:action="@{/admin/rooms}" method="get" class="row g-2 align-items-end">
                <div class="col-md-3">
                    <label class="form-label small fw-600 mb-1">Tìm số phòng</label>
                    <input type="text" name="search" class="form-control"
                           placeholder="VD: 101"
                           th:value="${filterSearch}">
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-600 mb-1">Loại phòng</label>
                    <select name="type" class="form-select">
                        <option value="">Tất cả loại</option>
                        <option th:each="t : ${roomTypes}"
                                th:value="${t.name()}"
                                th:text="${t.displayName}"
                                th:selected="${t == filterType}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-600 mb-1">Trạng thái</label>
                    <select name="status" class="form-select">
                        <option value="">Tất cả trạng thái</option>
                        <option th:each="s : ${roomStatuses}"
                                th:value="${s.name()}"
                                th:text="${s.displayName}"
                                th:selected="${s == filterStatus}"></option>
                    </select>
                </div>
                <div class="col-md-3 d-flex gap-2">
                    <button class="btn btn-gold" type="submit">
                        <i class="bi bi-funnel me-1"></i>Lọc
                    </button>
                    <a th:href="@{/admin/rooms}" class="btn btn-outline-secondary">Xoá lọc</a>
                </div>
            </form>
        </div>

        <div class="table-luxury table-responsive">
            <table class="table mb-0 align-middle">
                <thead>
                <tr>
                    <th>Số phòng</th>
                    <th>Loại</th>
                    <th class="text-end">Giá/đêm</th>
                    <th class="text-center">Sức chứa</th>
                    <th class="text-center">Trạng thái</th>
                    <th>Ảnh</th>
                    <th class="text-end">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="r : ${rooms}">
                    <td>
                        <strong style="color:var(--navy)" th:text="${r.roomNumber}"></strong>
                    </td>
                    <td>
                        <span class="room-badge d-inline"
                              th:classappend="|badge-${#strings.toLowerCase(r.type.name())}|"
                              th:text="${r.type.displayName}"
                              style="position:static;border-radius:3px;"></span>
                    </td>
                    <td class="text-end">
                        <strong style="color:var(--gold-deep)"
                                th:text="${#numbers.formatInteger(r.pricePerNight, 0, 'POINT')} + ' VND'"></strong>
                    </td>
                    <td class="text-center">
                        <i class="bi bi-people small me-1" style="color:var(--gold)"></i>
                        <span th:text="${r.capacity}"></span>
                    </td>
                    <td class="text-center">
                        <span class="status-badge"
                              th:classappend="${r.status.name() == 'AVAILABLE'} ? 'status-completed' :
                                              (${r.status.name() == 'OCCUPIED'} ? 'status-confirmed' : 'status-cancelled')"
                              th:text="${r.status.displayName}"></span>
                    </td>
                    <td>
                        <div class="d-flex gap-1">
                            <img th:each="img,stat : ${r.images}" th:if="${stat.index < 2}"
                                 th:src="${img}"
                                 style="width:40px;height:32px;object-fit:cover;border-radius:3px;"
                                 alt="">
                            <span th:if="${#lists.size(r.images) > 2}" class="small text-muted align-self-center">
                                +<span th:text="${#lists.size(r.images) - 2}"></span>
                            </span>
                            <span th:if="${#lists.isEmpty(r.images)}" class="small text-muted">—</span>
                        </div>
                    </td>
                    <td class="text-end">
                        <a th:href="@{/admin/rooms/{id}/edit(id=${r.id})}"
                           class="btn btn-sm btn-navy me-1">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form th:action="@{/admin/rooms/{id}/delete(id=${r.id})}" method="post"
                              class="d-inline"
                              onsubmit="return confirm('Bạn chắc muốn xoá phòng này?');">
                            <button class="btn btn-sm btn-outline-danger">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
